<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{headline}} — EITPN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Merriweather:ital,wght@0,300;0,400;1,300;1,400&family=Merriweather+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <script>
    (function () {
      var savedTheme = localStorage.getItem('theme');
      var theme = savedTheme === 'dark' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>

  <nav class="navbar">
    <div class="container navbar__inner">
      <div class="navbar__group">
        <div class="navbar__links" aria-label="Primary">
          <a href="../index.html" class="navbar__link">About</a>
          <a href="../articles.html" class="navbar__link">Articles</a>
          <a href="../survey-results.html" class="navbar__link">Survey results</a>
        </div>
      </div>
      <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light and dark mode" title="Toggle theme">
        <span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">☾</span>
        <span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">☀</span>
      </button>
    </div>
  </nav>

  <div class="article-wrapper">

    <header class="article-header">
      <p class="article-category">{{category}}</p>
      <h1 class="article-headline">{{headline}}</h1>
      <p class="article-byline">By <strong>{{author}}</strong> &mdash; {{date}}</p>
    </header>

    <article class="article-content">
      {{body}}
    </article>

    {{sources_section}}

    <footer class="article-copyright">
      {{copyright}}
    </footer>

  </div>

  <footer class="site-copyright-bar" role="contentinfo">
    <p class="site-copyright-bar__text">&copy; <span class="site-copyright-year">2026</span> Plastic News.</p>
  </footer>

  <script>
    (function () {
      var root = document.documentElement;
      var toggleButton = document.getElementById('themeToggle');

      if (!toggleButton) return;

      function currentTheme() {
        return root.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
      }

      function applyTheme(theme) {
        root.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        toggleButton.setAttribute('aria-label', theme === 'light' ? 'Switch to dark mode' : 'Switch to light mode');
      }

      applyTheme(currentTheme());

      var copyrightYearNodes = document.querySelectorAll('.site-copyright-year');
      var currentYear = new Date().getFullYear();
      copyrightYearNodes.forEach(function (node) {
        node.textContent = String(currentYear);
      });

      toggleButton.addEventListener('click', function () {
        applyTheme(currentTheme() === 'light' ? 'dark' : 'light');
      });
    })();
  </script>

</body>
</html>
