<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>csongorszasz</title>
    <style>
      /* 1. The Canvas */

      /* Add smooth scrolling */
      html {
        scroll-behavior: smooth;
      }

      body {
        background-color: #0a0a0a; /* Almost pure black (easier on eyes) */
        color: #e0e0e0; /* Soft white text */
        margin: 0;
        padding: 0;

        /* 2. Typography - The "Book" Feel */
        font-family: "Georgia", "Times New Roman", serif;
        font-size: 18px;
        line-height: 1.8; /* Generous spacing for reading */
      }

      /* Custom scrollbar styling */
      ::-webkit-scrollbar {
        width: 16px; /* Wider scrollbar */
      }

      ::-webkit-scrollbar-track {
        background: #0a0a0a; /* Match body background */
      }

      ::-webkit-scrollbar-thumb {
        background: #2a2a2a; /* Dark gray thumb */
        border-radius: 8px; /* Smooth rounded edges */
        border: 3px solid #0a0a0a; /* Padding effect */
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #3a3a3a; /* Slightly lighter on hover */
      }

      /* Firefox scrollbar */
      * {
        scrollbar-width: auto; /* auto or thin */
        scrollbar-color: #2a2a2a #0a0a0a; /* thumb track */
      }

      /* 3. The Central Column */
      .container {
        max-width: 600px; /* Limits width to readable book standard */
        margin: 0 auto; /* Centers the column perfectly */
        padding: 80px 20px; /* Top/Bottom padding & Side padding for mobile */
      }

      /* 4. Text Styling */
      h1,
      h2 {
        font-weight: normal;
        letter-spacing: 2px;
        margin-bottom: 10px;
        text-align: center;
      }

      p {
        margin-bottom: 30px;
      }

      /* 5. GIF/Image Styling */
      img {
        max-width: 100%; /* Ensures GIFs don't overflow on mobile */
        height: auto;
        display: block;
        margin: 50px auto; /* Adds breathing room around visuals */
        border-radius: 4px; /* Optional: Slight smoothing of edges */
        background: #1a1a1a; /* Placeholder color while loading */
      }

      /* 6. Links */
      a {
        color: #fff;
        text-decoration: underline;
        text-decoration-thickness: 1px;
        text-underline-offset: 4px;
      }
      a:hover {
        color: #888;
      }
    </style>
  </head>
