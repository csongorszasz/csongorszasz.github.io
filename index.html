<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Csongor Szász</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body {
        height: 100%;
      }

      body {
        font-family: "Georgia", "Times New Roman", serif;
        background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.95)), url("files/aurora4.jpg");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
        display: flex;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
      }

      .card {
        border-radius: 4px;
        padding: 52px 60px;
        max-width: 420px;
        width: calc(100% - 40px);
        margin-left: 8vw;
      }

      h1 {
        font-size: 22px;
        font-weight: normal;
        letter-spacing: 3px;
        color: #dfe3e9;
        margin-bottom: 6px;
        text-transform: uppercase;
      }

      .pronunciation {
        font-size: 14px;
        letter-spacing: 7px;
        color: #cfd4db;
        font-family: "Courier New", "Courier", monospace;
        font-style: italic;
        margin-bottom: 20px;
      }

      .position {
        font-size: 12px;
        letter-spacing: 1.5px;
        color: #878c94;
        margin-bottom: 30px;
      }

      .contact-list {
        list-style: none;
        margin-bottom: 38px;
      }

      .contact-list li {
        font-size: 13px;
        letter-spacing: 0.5px;
        color: #878c94;
        margin-bottom: 10px;
        font-family: "Courier New", "Courier", monospace;
      }

      .contact-list li:last-child {
        margin-bottom: 0;
      }

      .contact-list a {
        color: #878c94;
        text-decoration: none;
        transition: color 0.2s;
      }

      .contact-list a:hover {
        color: #c8d4e0;
      }

      .links {
        display: flex;
        gap: 28px;
      }

      .links a {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #7d8088;
        text-decoration: none;
        transition: color 0.2s;
      }

      .links a:hover {
        color: #9aaabb;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Csongor Szász</h1>
      <p class="pronunciation">"Chon-gor Sas"</p>
      <p class="position">MSc student in AI</p>
      <ul class="contact-list">
        <li>+47 465 33 135</li>
        <li><a href="mailto:szasz.csongor1@gmail.com">szasz.csongor1@gmail.com</a></li>
        <li>Trondheim, Norway</li>
      </ul>
      <nav class="links">
        <a href="files/CV_CsongorSzasz.pdf" target="_blank" rel="noopener noreferrer"><u>CV</u></a>
        <a href="https://linkedin.com/in/csongorszasz" target="_blank" rel="noopener noreferrer"><u>LinkedIn</u></a>
        <a href="https://github.com/csongorszasz" target="_blank" rel="noopener noreferrer"><u>GitHub</u></a>
      </nav>
    </div>
  </body>
</html>
